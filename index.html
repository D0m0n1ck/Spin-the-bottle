<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spin The Bottle - Blindfolded</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Work Sans', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #000000;
      color: #333;
    }

    .nav-links a:hover {
      text-decoration: underline;
    }   

    h1 {
      font-size: 4rem;
      color: white;
      text-align: center;
      font-family: 'Pacifico', cursive;
      margin-bottom: 50px;
      margin-top: 150px;
    }

    h2 {
      font-size: 1.8rem;
      color: #430b0b;
      margin-bottom: 40px;
    }

    p {
      font-size: 1rem;
      color: white;
      text-align: center;
      font-family: 'Pacifico', cursive;
      margin-bottom: 50px;
    }

    h3 {
      font-size: 1rem;
      color: white;
      font-family: 'Pacifico', cursive;
    }

    button {
      background-color: #d21111;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 1rem;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #3b0606;
    }

    .highlight {
      color: red;
      font-family: 'lobster Two', cursive;
      font-weight: bold;
    }

    .link {
      text-align: center;
      margin-top: 20px;
    }

    .link a {
      color: #0e1110;
      text-decoration: none;
      font-weight: 600;
    }

    .link a:hover {
      text-decoration: underline;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgb(32, 29, 29);
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      padding: 10px 20px;
      box-sizing: border-box;
    }

    .nav .brand {
      color: white;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav .nav-items {
      display: flex;
      gap: 1rem;
    }

    .nav .nav-items a {
      padding: 10px 15px;
      color: white;
      text-decoration: none;
      font-weight: 500;
      background-color: #af0f0f;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    .nav .nav-items a:hover { 
      background-color: #ff4444;
    }

    .item {
      display: inline-block;
    }

    .content-wrapper {
      text-align: center;
    }

    .button-container {
      text-align: center;
      margin-top: 30px;
    }

    .button-container a {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="brand">
      <span class="highlight">&#9829</span>
      <h3>Spin The Bottle</h3>
    </div>
    <div class="nav-items">
      <a href="index.html">Home</a>
      <a href="profile.html">Profile</a>
      <a href="Match.html">Match</a>
    </div>
  </nav>

  <div class="content-wrapper">
    <h1>
      See the <span class="highlight">soul</span> <br>
      not the selfie
    </h1>
    <p>
      Blindfold strips away the superficial. No Photos. No <br>
      catfishing. Just authentic connections built on who you <br>
      really are
    </p>

    <div class="button-container">
      <a href="profile.html"><button>Set up Profile -></button></a>
    </div>
  </div>

</body>
</html>
