<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Spin the Bottle</title>
    <link rel="stylesheet" href="styles.css">
</head>
<style>
    body {
        font-family: 'Work Sans', sans-serif;
        margin: 0;
        padding: 0;
        background-color: #000000;
        color: white;
    }

    nav.nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 20px;
        background-color: #1a1a1a;
    }
    
    .brand {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .brand h3 {
        margin: 0;
        font-size: 1.2rem;
    }
    
    .highlight {
        color: #af0f0f;
    }
    
    .nav-items {
        display: flex;
        gap: 15px;
    }
    
    .nav-items a {
        color: white;
        text-decoration: none;
        font-size: 0.85rem;
        background-color: #af0f0f;
        padding: 6px 12px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
        transition: background-color 0.3s;
        white-space: nowrap;
    }
    
    .nav-items a:hover {
        background-color: #ff4444;
    }

    .chat-container {
        max-width: 600px;
        margin: 60px auto 20px auto;
        height: 70vh;
        border: 2px solid #af0f0f;
        border-radius: 15px;
        background-color: #0a0a0a;
        display: flex;
        flex-direction: column;
    }

    .chat-header {
        background-color: #1a1a1a;
        padding: 20px;
        border-bottom: 2px solid #af0f0f;
        border-radius: 13px 13px 0 0;
        text-align: center;
    }

    .chat-header h2 {
        margin: 0;
        color: #af0f0f;
        font-size: 1.5rem;
    }

    .messages-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .message {
        display: flex;
        justify-content: flex-start;
    }

    .message.own {
        justify-content: flex-end;
    }

    .message-bubble {
        background-color: #1a1a1a;
        border: 1px solid #af0f0f;
        padding: 12px 16px;
        border-radius: 15px;
        max-width: 70%;
        word-wrap: break-word;
        color: white;
        font-size: 0.95rem;
    }

    .message.own .message-bubble {
        background-color: #af0f0f;
        border-color: #af0f0f;
        color: white;
    }

    .input-container {
        display: flex;
        gap: 10px;
        padding: 20px;
        background-color: #1a1a1a;
        border-top: 2px solid #af0f0f;
        border-radius: 0 0 13px 13px;
    }

    .input-container input {
        flex: 1;
        padding: 12px;
        border: 1px solid #af0f0f;
        border-radius: 20px;
        background-color: #0a0a0a;
        color: white;
        font-family: 'Work Sans', sans-serif;
    }

    .input-container input:focus {
        outline: none;
        border-color: #ff4444;
        box-shadow: 0 0 10px rgba(175, 15, 15, 0.5);
    }

    .send-btn {
        background-color: #af0f0f;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: 600;
        transition: background-color 0.3s;
    }

    .send-btn:hover {
        background-color: #ff4444;
    }

    .empty-state {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #ccc;
        font-size: 1.1rem;
    }
</style>

<body>
    <nav class="nav">
        <div class="brand"><span class="highlight">&#9829</span><h3>Spin The Bottle</h3></div>
        <div class="nav-items">
            <a href="index.html">Home</a>
            <a href="profile.html">Profile</a>
            <a href="Match.html">Match</a>
            <a href="chat.html">Chat</a>
            <a href="Playlist.Html">Playlist</a>
        </div>
    </nav>

    <div class="chat-container">
        <div class="chat-header">
            <h2 id="chatName">Chat</h2>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div class="empty-state">Start a conversation...</div>
        </div>
        <div class="input-container">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Type a message..." 
                onkeypress="handleKeyPress(event)"
            >
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

   
</body>
</html>
